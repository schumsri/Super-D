<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kong Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="glass w-full max-w-md p-6 rounded-3xl shadow-2xl">
        <h1 class="text-2xl font-bold mb-2 text-center text-blue-400">Video Saver</h1>
        <p class="text-center text-gray-400 text-xs mb-6">โหลด IG, TikTok, FB (No Ads)</p>
        
        <input type="text" id="urlInput" placeholder="วางลิงก์โพสต์ที่นี่..." 
            class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
        
        <button onclick="processDownload()" id="btn"
            class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-2xl transition-all active:scale-95">
            ดึงข้อมูลวิดีโอ
        </button>

        <div id="loading" class="mt-6 hidden text-center">
            <div class="animate-bounce text-blue-400">กำลังประมวลผล...</div>
        </div>

        <div id="result" class="mt-6 hidden space-y-3">
            <a id="downloadBtn" href="#" target="_blank" download
                class="block w-full bg-green-500 hover:bg-green-600 text-center text-white py-4 rounded-2xl font-bold shadow-lg">
                กดค้างเพื่อ "บันทึกวิดีโอ"
            </a>
            <p class="text-[10px] text-gray-500 text-center">หากกดแล้วไม่โหลด ให้เลือก "Download Link" หรือ "เปิดในเบราว์เซอร์"</p>
        </div>
    </div>

    <script>
        async function processDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('btn');
            const resultDiv = document.getElementById('result');
            const loading = document.getElementById('loading');

            if (!url) return alert('วางลิงก์ก่อนนะคะ');

            btn.disabled = true;
            btn.classList.add('opacity-50');
            loading.classList.remove('hidden');
            resultDiv.classList.add('hidden');

            try {
                // พยายามเรียก API
                const response = await fetch('https://api.cobalt.tools/api/json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ 
                        url: url,
                        vQuality: '720', // ลดความละเอียดลงนิดเพื่อให้โหลดง่ายขึ้น
                        filenameStyle: 'basic'
                    })
                });

                const data = await response.json();
                
                if (data.url) {
                    const dBtn = document.getElementById('downloadBtn');
                    dBtn.href = data.url;
                    resultDiv.classList.remove('hidden');
                } else {
                    // ถ้า API หลักไม่ได้ ให้แจ้งเตือนสาเหตุที่พบบ่อย
                    alert('ไม่สามารถดึงข้อมูลได้:\n1. โพสต์อาจเป็นแบบส่วนตัว (Private)\n2. ลิงก์อาจไม่ถูกต้อง\n3. เซิร์ฟเวอร์กำลังโดน IG บล็อก ให้ลองใหม่ในอีก 5 นาทีค่ะ');
                }
            } catch (e) {
                alert('การเชื่อมต่อล้มเหลวค่ะ (API อาจจะล่มชั่วคราว)');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
