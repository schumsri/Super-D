<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; }
        .card { background: #2d2d2d; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-5">
    <div class="card w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-5 text-blue-400">Video Downloader</h1>
        <p class="text-sm text-gray-400 mb-4">วางลิงก์จาก TikTok, FB, IG ได้เลยค่ะ</p>
        
        <input type="text" id="urlInput" placeholder="วางลิงก์ที่นี่..." 
            class="w-full p-3 rounded-lg bg-gray-700 border-none text-white focus:ring-2 focus:ring-blue-500 mb-4">
        
        <button onclick="downloadVideo()" id="btn"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
            ดึงข้อมูลวิดีโอ
        </button>

        <div id="result" class="mt-6 hidden text-left">
            <p id="title" class="text-sm font-medium mb-3"></p>
            <a id="downloadBtn" href="#" target="_blank"
                class="block w-full bg-green-600 text-center text-white py-2 rounded-lg font-bold">
                กดค้างเพื่อบันทึกวิดีโอ
            </a>
        </div>
    </div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('urlInput').value;
            const btn = document.getElementById('btn');
            const resultDiv = document.getElementById('result');

            if (!url) return alert('กรุณาวางลิงก์ก่อนนะคะ');

            btn.innerText = 'กำลังประมวลผล...';
            btn.disabled = true;

            try {
                // ใช้ API สาธารณะที่รองรับหลายแพลตฟอร์ม (ตัวอย่างนี้ใช้ของ Cobalt ที่ไม่มีโฆษณา)
                const response = await fetch('https://api.cobalt.tools/api/json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                
                if (data.url) {
                    document.getElementById('downloadBtn').href = data.url;
                    resultDiv.classList.remove('hidden');
                } else {
                    alert('ไม่สามารถดึงคลิปได้ ลองตรวจสอบลิงก์อีกครั้งนะ');
                }
            } catch (error) {
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อค่ะ');
            } finally {
                btn.innerText = 'ดึงข้อมูลวิดีโอ';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
