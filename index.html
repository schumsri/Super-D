<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kong Saver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .main-card { background: #121212; border: 1px solid #333; border-radius: 24px; }
        .input-box { background: #1e1e1e; border: 1px solid #444; }
        .loading-spin { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-5">
    <div class="main-card w-full max-w-sm p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white mb-2">Video Downloader</h1>
            <p class="text-gray-500 text-sm">โหลดคลิป IG, TikTok, FB ไม่มีโฆษณา</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="urlInput" placeholder="วางลิงก์โพสต์ที่นี่..." 
                class="input-box w-full p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-all">
            
            <button onclick="startDownload()" id="btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 flex items-center justify-center">
                <span id="btnText">ดึงข้อมูลวิดีโอ</span>
                <div id="loader" class="loading-spin ml-2 hidden"></div>
            </button>
        </div>

        <div id="result" class="mt-8 hidden animate-fade-in">
            <div class="p-4 bg-blue-900/20 border border-blue-500/30 rounded-2xl mb-4">
                <p class="text-blue-400 text-sm text-center font-medium">✨ พร้อมดาวน์โหลดแล้วค่ะ!</p>
            </div>
            <a id="downloadBtn" href="#" target="_blank"
                class="block w-full bg-white text-black text-center py-4 rounded-2xl font-bold hover:bg-gray-100 transition-all">
                กดที่นี่เพื่อเปิดวิดีโอ
            </a>
            <p class="text-[10px] text-gray-500 text-center mt-3">เมื่อหน้าต่างใหม่เปิดขึ้นมา ให้กด "จุด 3 จุด" แล้วเลือกดาวน์โหลดนะคะ</p>
        </div>
    </div>

    <script>
        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('btn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');

            if (!url) {
                alert('กรุณาวางลิงก์ก่อนนะคะคุณก้อง');
                return;
            }

            // เริ่มการประมวลผล
            btn.disabled = true;
            btnText.innerText = 'กำลังประมวลผล';
            loader.classList.remove('hidden');
            resultDiv.classList.add('hidden');

            try {
                // เปลี่ยนไปใช้ API ของ Cobalt ตัวสำรองที่มักจะเสถียรกว่า
                const response = await fetch('https://api.cobalt.tools/api/json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ 
                        url: url,
                        vQuality: '1080',
                        filenameStyle: 'basic'
                    })
                });

                const data = await response.json();
                
                if (data.url) {
                    document.getElementById('downloadBtn').href = data.url;
                    resultDiv.classList.remove('hidden');
                } else {
                    alert('ตัวดึงข้อมูลมีปัญหาชั่วคราวค่ะ:\n- คลิปอาจเป็น Private\n- หรือเซิร์ฟเวอร์โดน IG บล็อก\nลองเปลี่ยนลิงก์อื่นดูนะคะ');
                }
            } catch (error) {
                alert('การเชื่อมต่อล้มเหลวค่ะ ลองปิดแล้วเปิดแอปใหม่นะคะ');
            } finally {
                btn.disabled = false;
                btnText.innerText = 'ดึงข้อมูลวิดีโอ';
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
