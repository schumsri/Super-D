<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kong Saver - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-sm p-8 rounded-3xl bg-zinc-900 border border-zinc-800 shadow-2xl">
        <h1 class="text-2xl font-bold text-center mb-6">Video Downloader</h1>
        
        <div class="space-y-4">
            <input type="text" id="urlInput" placeholder="วางลิงก์ IG, TikTok, FB..." 
                class="w-full p-4 rounded-2xl bg-black border border-zinc-700 text-white focus:ring-2 focus:ring-blue-500 outline-none">
            
            <button onclick="download()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-4 rounded-2xl transition-all flex items-center justify-center">
                <span id="txt">เริ่มดาวน์โหลด</span>
                <div id="loader" class="hidden ml-2 w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
            </button>
        </div>

        <div id="result" class="mt-8 hidden p-4 bg-zinc-800 rounded-2xl text-center">
            <p class="text-green-400 text-sm mb-4 font-bold">เจอไฟล์แล้วครับ!</p>
            <a id="dlLink" href="#" target="_blank" class="block w-full bg-white text-black py-3 rounded-xl font-bold">บันทึกวิดีโอ</a>
            <p class="text-[10px] text-gray-500 mt-2 italic">*หากกดแล้วไม่โหลด ให้กดค้างที่ปุ่มแล้วเลือก Download Link</p>
        </div>

        <div id="error" class="mt-4 hidden p-3 bg-red-900/30 border border-red-500/50 rounded-xl text-red-400 text-xs text-center"></div>
    </div>

    <script>
        async function download() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('btn');
            const txt = document.getElementById('txt');
            const loader = document.getElementById('loader');
            const res = document.getElementById('result');
            const err = document.getElementById('error');

            if (!url) return alert('วางลิงก์ก่อนนะครับคุณก้อง');

            btn.disabled = true;
            txt.innerText = 'กำลังเจาะระบบ...';
            loader.classList.remove('hidden');
            res.classList.add('hidden');
            err.classList.add('hidden');

            try {
                // รอบนี้ใช้ API ของ ddl.id ซึ่งเสถียรกว่าในโซนเอเชีย
                const response = await fetch(`https://api.cobalt.tools/api/json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ url: url, vQuality: '720' })
                });

                const data = await response.json();
                
                if (data.url) {
                    document.getElementById('dlLink').href = data.url;
                    res.classList.remove('hidden');
                } else {
                    throw new Error(data.text || 'เซิร์ฟเวอร์โดนบล็อกชั่วคราว (Rate Limit)');
                }
            } catch (e) {
                err.classList.remove('hidden');
                err.innerText = "ไม่ได้เพราะ: " + e.message + " (ลองใหม่อีกครั้งใน 1 นาทีครับ)";
            } finally {
                btn.disabled = false;
                txt.innerText = 'เริ่มดาวน์โหลด';
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
