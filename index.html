<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Downloader Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .app-container { background: #1e1e1e; border-radius: 20px; border: 1px solid #333; }
        input::placeholder { color: #666; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="app-container w-full max-w-md p-8 shadow-2xl">
        <h1 class="text-3xl font-extrabold mb-2 text-center text-white">Video Saver</h1>
        <p class="text-center text-gray-500 mb-8 text-sm">ไม่มีโฆษณา • รองรับ IG, TikTok, FB, YT</p>
        
        <div class="space-y-4">
            <input type="text" id="urlInput" placeholder="วางลิงก์ที่นี่..." 
                class="w-full p-4 rounded-xl bg-black border border-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            
            <button onclick="downloadVideo()" id="btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">
                เริ่มดาวน์โหลด
            </button>
        </div>

        <div id="result" class="mt-8 hidden space-y-4">
            <div class="p-4 bg-green-900/20 border border-green-500/50 rounded-lg">
                <p class="text-green-400 text-sm text-center font-medium">เตรียมไฟล์สำเร็จแล้วค่ะ!</p>
            </div>
            <a id="downloadBtn" href="#" target="_blank"
                class="block w-full bg-white text-black text-center py-4 rounded-xl font-bold hover:bg-gray-200 transition-all">
                กดค้างเพื่อบันทึกไฟล์
            </a>
            <p class="text-center text-xs text-gray-500">หากกดแล้วไม่โหลด ให้เลือก "Download Link" นะคะ</p>
        </div>

        <div id="loading" class="mt-6 hidden text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500"></div>
            <p class="mt-2 text-sm text-gray-400">กำลังติดต่อเซิร์ฟเวอร์...</p>
        </div>
    </div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('btn');
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');

            if (!url) {
                alert('กรุณาวางลิงก์ด้วยนะคะ');
                return;
            }

            // ซ่อนผลลัพธ์เก่าและแสดงตัวโหลด
            resultDiv.classList.add('hidden');
            loadingDiv.classList.remove('hidden');
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                // ใช้ Cobalt API เวอร์ชันอัปเดต
                const response = await fetch('https://api.cobalt.tools/api/json', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Accept': 'application/json' 
                    },
                    body: JSON.stringify({ 
                        url: url,
                        videoQuality: '1080',
                        audioFormat: 'mp3',
                        filenameStyle: 'nerdy',
                        downloadMode: 'default'
                    })
                });

                const data = await response.json();
                
                if (data.url) {
                    document.getElementById('downloadBtn').href = data.url;
                    resultDiv.classList.remove('hidden');
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else {
                    alert('ดึงคลิปไม่ได้ค่ะ อาจเป็นโพสต์ส่วนตัว หรือลิงก์ผิดรูปแบบ');
                }
            } catch (error) {
                console.error(error);
                alert('การเชื่อมต่อขัดข้องค่ะ ลองใหม่อีกครั้งนะคะ');
            } finally {
                loadingDiv.classList.add('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
