<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kong Downloader Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .card { background: #111; border: 1px solid #222; border-radius: 28px; }
        .btn-gradient { background: linear-gradient(90deg, #3b82f6, #2563eb); }
        .loader { border: 3px solid #222; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="card w-full max-w-sm p-8 shadow-2xl">
        <h1 class="text-2xl font-bold text-center mb-6 text-white">Video Saver PRO</h1>
        
        <div class="space-y-4">
            <input type="text" id="urlInput" placeholder="วางลิงก์ IG, TikTok, FB..." 
                class="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800 text-white outline-none focus:ring-2 focus:ring-blue-500">
            
            <button onclick="masterDownload()" id="btn"
                class="btn-gradient w-full text-white font-bold py-4 rounded-2xl flex items-center justify-center transition-all active:scale-95">
                <span id="btnText">ดาวน์โหลดทันที</span>
                <div id="loader" class="loader ml-2 hidden"></div>
            </button>
        </div>

        <div id="result" class="mt-8 hidden animate-bounce">
            <a id="downloadLink" href="#" target="_blank"
                class="block w-full bg-green-500 text-black text-center py-4 rounded-2xl font-black">
                ✅ กดตรงนี้เพื่อบันทึกวิดีโอ
            </a>
            <p class="text-[10px] text-gray-500 text-center mt-3 uppercase tracking-widest">Open in new tab and Save</p>
        </div>

        <div id="status" class="mt-4 text-center text-xs text-gray-500"></div>
    </div>

    <script>
        const API_LIST = [
            'https://api.cobalt.tools/api/json',
            'https://cobalt.api.unblocker.win/api/json',
            'https://api.v01.prod.cobalt.tools/api/json'
        ];

        async function masterDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('btn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');
            const status = document.getElementById('status');

            if (!url) return alert('วางลิงก์ก่อนนะคะคุณก้อง');

            btn.disabled = true;
            btnText.innerText = 'กำลังพยายามดึงข้อมูล...';
            loader.classList.remove('hidden');
            result.classList.add('hidden');
            status.innerText = "";

            // วนลูปใช้ API จนกว่าจะเจอตัวที่ทำงานได้
            for (let i = 0; i < API_LIST.length; i++) {
                try {
                    status.innerText = `กำลังลองช่องทางที่ ${i + 1}...`;
                    const response = await fetch(API_LIST[i], {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ url: url, vQuality: '1080' })
                    });

                    const data = await response.json();
                    if (data.url) {
                        document.getElementById('downloadLink').href = data.url;
                        result.classList.remove('hidden');
                        status.innerText = "สำเร็จแล้วค่ะ!";
                        break; 
                    }
                } catch (e) {
                    console.log(`API ${i+1} ล้มเหลว`);
                }

                if (i === API_LIST.length - 1) {
                    alert('ขออภัยค่ะคุณก้อง ตอนนี้เซิร์ฟเวอร์โดนบล็อกทุกช่องทาง\nกรุณารอสัก 5-10 นาทีให้ระบบเปลี่ยน IP แล้วลองใหม่นะคะ');
                }
            }

            btn.disabled = false;
            btnText.innerText = 'ดาวน์โหลดทันที';
            loader.classList.add('hidden');
        }
    </script>
</body>
</html>
